
# ════════════════════════════════════════════════════════════════════════
# Executive parameters
executive:
  plots: True
  default_name_templates: # Names for every kind of file. 
    # base is set as {model.name}_{structure.name}, so operations 
    # are unique to the model + structure

    # raw
    "relax_traj": "{base}_relax.traj"
    "relaxed_poscar": "{base}_relaxed.poscar"
    "phonons_obj": "{base}_phonons.yaml"
    "force_constants": "{base}_force_constants.yaml"
    "phonon_dos_npz": "{base}_phonon_dos.npz"
    "phonon_band_yaml": "{base}_phonon_band.yaml"

    # plots (optional)
    "phonon_band_plot": "{base}_phonon_band_plot.png"
    "phonon_dispersion_dos_plot": "{base}_phonon_dispersion_dos.png"
    "phonon_dos_plot": "{base}_phonon_dos.png"

    # Plumipy
    "band_plumipy": "{base}_band.yaml"
    "contcar_gs_plumipy": "{base}_CONTCAR_GS"
    "outcar_gs_plumipy": "{base}_OUTCAR_GS"

#TODO: make naming per operation. As in, make default_name_templates a dictionary of dictionaries with files pertaining to the 'phonon' operation grouped together in their sub dictionary. 

# ════════════════════════════════════════════════════════════════════════
# Path configuration (all paths are relative to this config file unless absolute)
paths:
  assets_root: assets
  structures_root: assets/structures

phonon_coupling:
  contcar_gs: test/CBVN/CONTCAR_GS
  contcar_es: test/CBVN/CONTCAR_ES
  band_dft_path: test/CBVN/band.yaml
  q_tol: 1e-4
  lattice_tol: 1e-5
  threshold: 0.9
  freq_cluster_tol: 0.5
  freq_window: 0.5
  remove_mass_weighted_com: true
  gamma_only: true
  alpha: 1.3
  weight_kind: S

mlip_phonons:
  defaults:
    model_name: mace-mpa-0-medium
    structure: null

neb:
  defaults:
    model_name: ivac0_neb_ft
    results_root: resultsNEBvdw_3bdy_rlxd2_1
    models_root: assets/models
    structures_dir: assets/structures/NEB
    poscar_i: assets/structures/NEB/POSCAR_i
    poscar_f: assets/structures/NEB/POSCAR_f
    dft_neb_dat: assets/structures/NEB/neb.dat
    vasp_inputs_dir: null
    relax_endpoints: true
    remap_f_i: false
    include_vdw: true
    overwrite: false
    device: cuda
    dtype: float32
  settings:
    n_images_fallback: 9
    maxstep_mlip_guess: 0.05
    fmax_mlip_guess: 0.03
    steps_mlip_guess: 3000
    k_spring_mlip: 0.6
    k_spring: 0.6
    maxstep_mlip_d3: 0.03
    fmax_mlip_d3: 0.03
    steps_mlip_d3: 1400
    maxstep_ci: 0.03
    fmax_ci: 0.03
    steps_ci: 1000

