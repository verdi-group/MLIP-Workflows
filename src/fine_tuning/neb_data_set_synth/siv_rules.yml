rule:
  name: force_energy_barrier_bias
  percentile_bins:
    - low: 0.00
      high: 0.20
      weight: 0.5
    - low: 0.20
      high: 0.40
      weight: 1.0
    - low: 0.40
      high: 0.60
      weight: 2.0
    - low: 0.60
      high: 0.80
      weight: 1.0
    - low: 0.80
      high: 1.00
      weight: 0.5

split:
  train_pct: 80
  val_pct: 10
  test_pct: 10
  seed: 17
